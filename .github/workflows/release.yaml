name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-slim
            target: x86_64-linux
          - os: ubuntu-24.04-arm
            target: aarch64-linux
          - os: macos-latest
            target: aarch64-macos
          - os: macos-15-intel
            target: x86_64-macos

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/lib/libchroma.a dist/
          cp zig-out/lib/libchroma.so dist/ 2>/dev/null || cp zig-out/lib/libchroma.dylib dist/ 2>/dev/null || true
          cp zig-out/include/chroma.h dist/
          tar -czf libchroma-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: libchroma-${{ matrix.target }}.tar.gz
